apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-python
  namespace: demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: demo-python

  template:
    metadata:
      labels:
        app: demo-python

    spec:

      containers:

      - name: demo

        image: ghcr.io/fenixonline/argocd-demo:090965726f048f1f7bb6b1eaa695b8809ff4b6bc

        imagePullPolicy: Always

        ports:

        - containerPort: 5000