apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-python
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: demo-python

  template:
    metadata:
      labels:
        app: demo-python

    spec:

      containers:

      - name: demo

        image: ghcr.io/fenixonline/argocd-demo:9c11e7298a8aa7a69133b0ba607c1e6b6597d025

        imagePullPolicy: Always

        ports:

        - containerPort: 5000